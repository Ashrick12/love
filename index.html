<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Emily, With Love — Ashton</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blush: #f5e6e0;
    --blush-deep: #e8c9bc;
    --rose: #c97a6a;
    --rose-deep: #a5594a;
    --ivory: #fdf8f3;
    --gold: #c9a96e;
    --gold-light: #e8d5b0;
    --dark: #2d1f1a;
    --mid: #6b4a3f;
  }

  html { scroll-behavior: smooth; }
  body { background: var(--ivory); overflow-x: hidden; font-family: 'Jost', sans-serif; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    background: linear-gradient(160deg, var(--blush) 0%, var(--ivory) 55%, var(--gold-light) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden; text-align: center; padding: 4rem 2rem;
  }

  .hero-petals { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .petal { position: absolute; opacity: 0.18; animation: floatPetal linear infinite; }

  @keyframes floatPetal {
    0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.18; }
    90%  { opacity: 0.18; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  .hero-eyebrow {
    font-weight: 200; letter-spacing: 0.35em; font-size: 0.72rem;
    color: var(--rose); text-transform: uppercase; margin-bottom: 1.5rem;
    opacity: 0; animation: fadeUp 1s ease 0.3s forwards;
  }

  .hero-name {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(4.5rem, 14vw, 10rem); color: var(--dark);
    line-height: 0.9; letter-spacing: -0.02em;
    opacity: 0; animation: fadeUp 1.1s ease 0.5s forwards;
  }
  .hero-name em { font-style: italic; color: var(--rose-deep); }

  .hero-from {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
    font-size: clamp(1.1rem, 3vw, 1.6rem); color: var(--mid); margin-top: 1.8rem;
    opacity: 0; animation: fadeUp 1.1s ease 0.8s forwards;
  }

  .hero-divider {
    display: flex; align-items: center; gap: 1rem; margin: 2.5rem auto; width: 260px;
    opacity: 0; animation: fadeUp 1s ease 1s forwards;
  }
  .hero-divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
  .hero-symbol { font-size: 1rem; color: var(--gold); }

  /* ── HERO IMAGE ── */
  .hero-image-wrap {
    margin-top: 3rem; width: min(420px, 90vw);
    opacity: 0; animation: fadeUp 1s ease 1.2s forwards;
  }
  .hero-image-wrap img {
    width: 100%; aspect-ratio: 3/4; object-fit: cover;
    border-radius: 2px; box-shadow: 0 20px 60px rgba(45,31,26,0.18);
  }

  .hero-scroll {
    position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    opacity: 0; animation: fadeIn 1s ease 1.8s forwards;
    color: var(--rose); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
  }
  .scroll-line {
    width: 1px; height: 40px; background: linear-gradient(to bottom, var(--rose), transparent);
    animation: scrollPulse 2s ease infinite;
  }
  @keyframes scrollPulse {
    0%, 100% { opacity: 1; transform: scaleY(1); }
    50% { opacity: 0.4; transform: scaleY(0.6); }
  }

  /* ── PHOTO SECTIONS ── */

  /* Full-bleed single image */
  .photo-full {
    width: 100%; height: 70vh; min-height: 400px;
    position: relative; overflow: hidden;
  }
  .photo-full img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }

  /* Two-column side by side */
  .photo-pair {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  }
  .photo-pair .photo-cell { position: relative; overflow: hidden; }
  .photo-pair .photo-cell img { width: 100%; height: 55vw; max-height: 560px; object-fit: cover; display: block; }

  /* Three-column row */
  .photo-trio {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0;
  }
  .photo-trio .photo-cell img { width: 100%; height: 38vw; max-height: 420px; object-fit: cover; display: block; }

  /* Asymmetric: 2/3 + 1/3 */
  .photo-split {
    display: grid; grid-template-columns: 2fr 1fr; gap: 0;
  }
  .photo-split .photo-cell img { width: 100%; height: 55vw; max-height: 560px; object-fit: cover; display: block; }

  /* Asymmetric: 1/3 + 2/3 */
  .photo-split-r {
    display: grid; grid-template-columns: 1fr 2fr; gap: 0;
  }
  .photo-split-r .photo-cell img { width: 100%; height: 55vw; max-height: 560px; object-fit: cover; display: block; }

  /* Centred portrait */
  .photo-portrait {
    display: flex; justify-content: center;
    background: var(--blush);
    padding: 5rem 2rem;
  }
  .photo-portrait img {
    width: min(480px, 90vw); aspect-ratio: 2/3; object-fit: cover;
    border-radius: 2px; box-shadow: 0 20px 60px rgba(45,31,26,0.15);
  }

  /* Caption overlay on a cell */
  .caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 1.2rem 1.4rem 1rem;
    background: linear-gradient(to top, rgba(45,31,26,0.65) 0%, transparent 100%);
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1rem; color: white; pointer-events: none;
  }

  /* ── DIVIDER STRIP ── */
  .divider-strip {
    background: var(--dark); text-align: center;
    padding: 3.5rem 2rem;
  }
  .divider-strip p {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
    font-size: clamp(1.4rem, 3.5vw, 2.2rem); color: var(--blush);
    max-width: 600px; margin: 0 auto; line-height: 1.5;
  }

  /* ── CLOSING ── */
  .closing {
    background: var(--dark); text-align: center;
    padding: 7rem 2rem 6rem; position: relative; overflow: hidden;
  }
  .closing::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,122,106,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .closing-from {
    font-weight: 200; letter-spacing: 0.3em; font-size: 0.7rem;
    color: var(--gold); text-transform: uppercase; margin-bottom: 1.5rem;
  }
  .closing-sig {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(2.5rem, 8vw, 4.5rem); color: var(--rose); line-height: 1;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .photo-trio { grid-template-columns: 1fr 1fr; }
    .photo-trio .photo-cell:last-child { grid-column: span 2; }
    .photo-split, .photo-split-r { grid-template-columns: 1fr; }
    .photo-split .photo-cell img,
    .photo-split-r .photo-cell img { height: 80vw; max-height: 400px; }
    .photo-pair .photo-cell img { height: 80vw; max-height: none; }
    .photo-trio .photo-cell img { height: 50vw; max-height: none; }
  }
</style>
</head>
<body>

<!-- floating petals -->
<div class="hero-petals" id="petals"></div>

<!-- ═══════════════════════════════════════
     HERO
     Replace images/hero.jpg with your image
     ═══════════════════════════════════════ -->
<header class="hero">
  <p class="hero-eyebrow">With all my love</p>
  <h1 class="hero-name">For <em>Emily</em></h1>
  <p class="hero-from">— from Ashton</p>
  <div class="hero-divider">
    <div class="hero-divider-line"></div>
    <span class="hero-symbol">✦</span>
    <div class="hero-divider-line"></div>
  </div>

  <!-- HERO PHOTO -->
  <div class="hero-image-wrap">
    <img src="images/hero.jpg" alt="Emily">
  </div>

  <div class="hero-scroll">
    <div class="scroll-line"></div>
    <span>Scroll</span>
  </div>
</header>


<!-- ═══════════════════════════════════════
     FULL-BLEED IMAGE 1
     Replace images/photo1.jpg
     ═══════════════════════════════════════ -->
<div class="photo-full reveal">
  <img src="images/photo1.jpg" alt="">
</div>


<!-- ═══════════════════════════════════════
     SIDE-BY-SIDE PAIR
     Replace images/photo2.jpg & photo3.jpg
     ═══════════════════════════════════════ -->
<div class="photo-pair">
  <div class="photo-cell reveal">
    <img src="images/photo2.jpg" alt="">
  </div>
  <div class="photo-cell reveal">
    <img src="images/photo3.jpg" alt="">
  </div>
</div>


<!-- ═══════════════════════════════════════
     DARK QUOTE STRIP
     Edit this text — it's the only text on the site
     ═══════════════════════════════════════ -->
<div class="divider-strip">
  <p>Write something here — a date, a place, a few words that mean something to you both.</p>
</div>


<!-- ═══════════════════════════════════════
     ASYMMETRIC SPLIT (wide left)
     Replace images/photo4.jpg & photo5.jpg
     ═══════════════════════════════════════ -->
<div class="photo-split">
  <div class="photo-cell reveal">
    <img src="images/photo4.jpg" alt="">
    <div class="caption">Your caption here</div>
  </div>
  <div class="photo-cell reveal">
    <img src="images/photo5.jpg" alt="">
  </div>
</div>


<!-- ═══════════════════════════════════════
     THREE-COLUMN ROW
     Replace images/photo6.jpg, photo7.jpg, photo8.jpg
     ═══════════════════════════════════════ -->
<div class="photo-trio">
  <div class="photo-cell reveal">
    <img src="images/photo6.jpg" alt="">
  </div>
  <div class="photo-cell reveal">
    <img src="images/photo7.jpg" alt="">
  </div>
  <div class="photo-cell reveal">
    <img src="images/photo8.jpg" alt="">
  </div>
</div>


<!-- ═══════════════════════════════════════
     FULL-BLEED IMAGE 2
     Replace images/photo9.jpg
     ═══════════════════════════════════════ -->
<div class="photo-full reveal">
  <img src="images/photo9.jpg" alt="">
</div>


<!-- ═══════════════════════════════════════
     ASYMMETRIC SPLIT (wide right)
     Replace images/photo10.jpg & photo11.jpg
     ═══════════════════════════════════════ -->
<div class="photo-split-r">
  <div class="photo-cell reveal">
    <img src="images/photo10.jpg" alt="">
  </div>
  <div class="photo-cell reveal">
    <img src="images/photo11.jpg" alt="">
    <div class="caption">Another caption if you like</div>
  </div>
</div>


<!-- ═══════════════════════════════════════
     CENTRED PORTRAIT
     Replace images/portrait.jpg
     ═══════════════════════════════════════ -->
<div class="photo-portrait reveal">
  <img src="images/portrait.jpg" alt="">
</div>


<!-- ═══════════════════════════════════════
     CLOSING
     ═══════════════════════════════════════ -->
<div class="closing">
  <p class="closing-from">Always & forever</p>
  <p class="closing-sig">Ashton x</p>
</div>


<script>
  // Floating petals
  const pc = document.getElementById('petals');
  const cols = ['#e8c9bc','#f0d5c8','#d4a898','#c9a96e','#f5e6e0'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const s = 8 + Math.random() * 18;
    p.style.cssText = `width:${s}px;height:${s*1.4}px;left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${12+Math.random()*18}s;animation-delay:${Math.random()*15}s;border-radius:${Math.random()>.5?'50% 0 50% 0':'0 50% 0 50%'};`;
    pc.appendChild(p);
  }

  // Scroll-reveal
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>
</body>
</html>
